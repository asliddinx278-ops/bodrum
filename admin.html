<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>BODRUM - Admin Panel</title>
  <link rel="stylesheet" href="admin.css"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="admin-header">
    <div class="brand">BODRUM ADMIN</div>
    <div class="status">
      <span class="status-dot"></span>
      <span id="statusText">Online</span>
    </div>
  </div>

  <main id="adminContent">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="newOrdersCount">0</div>
        <div class="stat-label">Yangi buyurtmalar</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalOrdersCount">0</div>
        <div class="stat-label">Jami buyurtmalar</div>
      </div>
    </div>

    <div class="orders-section">
      <h2 class="section-title">📦 Yangi Buyurtmalar</h2>
      <div id="newOrdersList" class="orders-list">
        <div class="empty-state">Yangi buyurtmalar yo'q</div>
      </div>
    </div>

    <div class="orders-section">
      <h2 class="section-title">✅ Qabul qilingan</h2>
      <div id="acceptedOrdersList" class="orders-list">
        <div class="empty-state">Qabul qilingan buyurtmalar yo'q</div>
      </div>
    </div>
  </main>

  <!-- Order Detail Modal -->
  <div id="orderModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Buyurtma #<span id="modalOrderId"></span></h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="order-info">
          <div class="info-row">
            <span class="info-label">👤 Mijoz:</span>
            <span id="modalCustomer" class="info-value"></span>
          </div>
          <div class="info-row">
            <span class="info-label">📞 Telefon:</span>
            <span id="modalPhone" class="info-value"></span>
          </div>
          <div class="info-row">
            <span class="info-label">📍 Manzil:</span>
            <a id="modalLocation" href="#" target="_blank" class="location-link">Xaritada ko'rish</a>
          </div>
          <div class="info-row">
            <span class="info-label">💰 Summa:</span>
            <span id="modalTotal" class="info-value price"></span>
          </div>
          <div class="info-row">
            <span class="info-label">🕐 Vaqt:</span>
            <span id="modalTime" class="info-value"></span>
          </div>
          <div class="info-row" id="paymentInfoRow">
            <span class="info-label">💳 To'lov:</span>
            <span id="modalPayment" class="info-value"></span>
          </div>
        </div>
        <div class="order-items">
          <h4>Buyurtma mahsulotlari:</h4>
          <ul id="modalItems"></ul>
        </div>
      </div>
      <div class="modal-footer" id="modalActions">
        <button class="btn-accept" onclick="acceptOrder()">✅ Qabul qilish</button>
        <button class="btn-reject" onclick="rejectOrder()">❌ Bekor qilish</button>
      </div>
    </div>
  </div>
